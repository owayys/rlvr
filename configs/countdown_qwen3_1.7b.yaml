# GRPO countdown training for Qwen3-1.7B-Base

base_config: pkg://verl/trainer/config/_generated_ppo_trainer.yaml

data:
  train_files: ${oc.env:DATA_DIR,./data/countdown}/train.parquet
  val_files: ${oc.env:DATA_DIR,./data/countdown}/test.parquet
  prompt_key: prompt
  reward_fn_key: data_source
  max_prompt_length: 256
  max_response_length: 1024
  train_batch_size: 128
  val_batch_size: 32
  return_raw_chat: false
  return_raw_input_ids: false
  shuffle: true
  dataloader_num_workers: 4
  validation_shuffle: false
  filter_overlong_prompts: false
  truncation: error

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: ${oc.env:BASE_MODEL,Qwen/Qwen3-1.7B-Base}
    use_remove_padding: true
    enable_gradient_checkpointing: true
    enable_activation_offload: false
    override_config:
      attn_implementation: flash_attention_2
  actor:
    strategy: fsdp
    use_dynamic_bsz: true
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 4
    use_kl_loss: true
    entropy_coeff: 0
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    loss_agg_mode: token-mean
    policy_loss:
      loss_mode: kl_cov
      kl_cov_ratio: 0.002
    optim:
      lr: 5e-6
    fsdp_config:
      use_torch_compile: false
      model_dtype: bfloat16
  rollout:
    name: vllm
    tensor_model_parallel_size: ${oc.decode:${oc.env:ROLLOUT_TP_SIZE,1}}
    gpu_memory_utilization: 0.4
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    max_num_seqs: 4
    max_num_batched_tokens: 1024
    log_prob_micro_batch_size: 1
    n: 16
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    dtype: bfloat16
    enforce_eager: true
  ref:
    log_prob_micro_batch_size: 1
    fsdp_config:
      use_torch_compile: false
      param_offload: false

critic:
  enable: false
  strategy: fsdp
  model:
    path: ${actor_rollout_ref.model.path}

algorithm:
  name: grpo
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  kl_ctrl:
    type: fixed
    kl_coef: 0.001

reward_model:
  enable: false
  style: rule

trainer:
  project_name: rlvr
  experiment_name: countdown-qwen3-1.7b
  total_epochs: 1
  total_training_steps: 300
  logger: ["console"]
  nnodes: ${oc.decode:${oc.env:NNODES,1}}
  n_gpus_per_node: ${oc.decode:${oc.env:N_GPUS,1}}
  save_freq: -1
  test_freq: -1
  use_legacy_worker_impl: disable
  default_hdfs_dir: null
  default_local_dir: ${oc.env:RLVR_OUT_DIR,./checkpoints}/rlvr/${trainer.experiment_name}
  device: cuda

runtime:
  ray:
    include_dashboard: false
    memory_monitor_refresh_ms: "0"
    memory_usage_threshold: "0.99"
    env_vars:
      TOKENIZERS_PARALLELISM: "true"
      NCCL_DEBUG: "WARN"
